name: PowerShell quality

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pinned quality tools
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force

      - name: Parse tracked PowerShell scripts
        shell: pwsh
        run: |
          $failures = foreach ($file in @(git ls-files -- '*.ps1')) {
              $tokens = $null
              $errors = $null
              $null = [System.Management.Automation.Language.Parser]::ParseFile(
                  (Join-Path $PWD $file),
                  [ref]$tokens,
                  [ref]$errors
              )
              foreach ($parseError in @($errors)) {
                  '{0}:{1}:{2}: {3}' -f $file,
                      $parseError.Extent.StartLineNumber,
                      $parseError.Extent.StartColumnNumber,
                      $parseError.Message
              }
          }
          if ($failures) {
              $failures | Write-Error
              throw "PowerShell parsing failed with $(@($failures).Count) error(s)."
          }

      - name: Run Pester 5 tests
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 5.7.1
          $configuration = New-PesterConfiguration
          $configuration.Run.Path = 'tests'
          $configuration.Run.PassThru = $true
          $configuration.Output.Verbosity = 'Detailed'
          $result = Invoke-Pester -Configuration $configuration
          if ($result.TotalCount -eq 0) { throw 'Pester discovered zero tests.' }
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) Pester test(s) failed."
          }

      - name: Run PSScriptAnalyzer error rules
        shell: pwsh
        run: |
          Import-Module PSScriptAnalyzer -RequiredVersion 1.25.0
          $findings = @(Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error)
          if ($findings) {
              $findings | Format-Table -AutoSize | Out-String | Write-Error
              throw "PSScriptAnalyzer reported $($findings.Count) error-severity finding(s)."
          }

      - name: Check diff integrity and clean worktree
        shell: pwsh
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if ($env:PR_BASE_SHA) {
              git diff --check "$env:PR_BASE_SHA...$env:GITHUB_SHA"
          } elseif ($env:PUSH_BEFORE_SHA -and $env:PUSH_BEFORE_SHA -notmatch '^0+$') {
              git diff --check "$env:PUSH_BEFORE_SHA..$env:GITHUB_SHA"
          } else {
              git show --check --format=oneline $env:GITHUB_SHA
          }
          if ($LASTEXITCODE -ne 0) { throw 'Git diff integrity check failed.' }

          $changes = @(git status --porcelain)
          if ($changes) {
              $changes | Write-Error
              throw 'Quality checks modified the worktree.'
          }
